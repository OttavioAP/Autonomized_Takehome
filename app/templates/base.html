<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}Team Activity Monitor{% endblock title %}</title>
        <link rel="stylesheet"
              href="{{ url_for('static', path='vendor/pico.min.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}" />
        {% block extra_head %}
        {% endblock extra_head %}
        <script src="{{ url_for('static', path='vendor/htmx.min.js') }}" defer></script>
        <script src="{{ url_for('static', path='vendor/htmx-ext-sse.js') }}" defer></script>
    </head>
    <body>
        {% block navbar %}
        {% endblock navbar %}
        <main class="container {% block main_class %}{% endblock main_class %}">
            {% block content %}
            {% endblock content %}
        </main>
    </body>
</html>
