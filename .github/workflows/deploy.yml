name: Deploy to Azure

# Auto-deploys on every push to main. This is a deliberate departure from the
# original MVP plan (manual workflow_dispatch only, no standing Azure
# credentials in GitHub) — see blueprints/deployment.md for the tradeoff and
# blueprints/specs/stack-and-infra.md for the updated decision. Appropriate for
# this throwaway ~1-week deployment; revisit before any longer-lived deploy.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: team_activity_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t team-activity-monitor:test .

      - name: Run migrations and pytest inside the built image
        # --network=host lets the container reach the postgres service on
        # localhost:5432 the same way GHA service containers are normally
        # reached from job steps - needed since this runs via `docker run`
        # directly rather than as another GHA service/step.
        #
        # tests/integrations/test_token_store.py hits the real Azure Key Vault, so this
        # container needs a real Azure credential for that too - but it can't just reuse
        # AZURE_CLIENT_ID/_SECRET/_TENANT_ID above, since those are the unrelated SSO app
        # registration's credentials and EnvironmentCredential (part of
        # DefaultAzureCredential's fallback chain) would authenticate as that app instead,
        # which has no Key Vault role and would 403. KEY_VAULT_CLIENT_ID/_SECRET/_TENANT_ID
        # are distinctly-named Settings fields read by ClientSecretCredential explicitly
        # (see app/services/token_store.py's _credential()) - AZURE_CREDENTIALS' service
        # principal (already used by the deploy job below, additionally granted Key Vault
        # Secrets Officer on the vault) is reused here rather than provisioning a second
        # identity just for this.
        run: |
          AZURE_CREDS='${{ secrets.AZURE_CREDENTIALS }}'
          KV_CLIENT_ID="$(echo "$AZURE_CREDS" | python3 -c 'import json,sys; print(json.load(sys.stdin)["clientId"])')"
          KV_CLIENT_SECRET="$(echo "$AZURE_CREDS" | python3 -c 'import json,sys; print(json.load(sys.stdin)["clientSecret"])')"
          KV_TENANT_ID="$(echo "$AZURE_CREDS" | python3 -c 'import json,sys; print(json.load(sys.stdin)["tenantId"])')"

          docker run --rm --network=host \
            -e DATABASE_URL="postgresql+asyncpg://app:app@localhost:5432/team_activity_monitor" \
            -e APP_ENV="development" \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            -e AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
            -e AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
            -e AZURE_REDIRECT_URI="${{ secrets.AZURE_REDIRECT_URI }}" \
            -e JIRA_OAUTH_CLIENT_ID="${{ secrets.JIRA_OAUTH_CLIENT_ID }}" \
            -e JIRA_OAUTH_CLIENT_SECRET="${{ secrets.JIRA_OAUTH_CLIENT_SECRET }}" \
            -e JIRA_OAUTH_REDIRECT_URI="${{ secrets.JIRA_OAUTH_REDIRECT_URI }}" \
            -e GITHUB_OAUTH_CLIENT_ID="${{ secrets.GH_OAUTH_CLIENT_ID }}" \
            -e GITHUB_OAUTH_CLIENT_SECRET="${{ secrets.GH_OAUTH_CLIENT_SECRET }}" \
            -e GITHUB_OAUTH_REDIRECT_URI="${{ secrets.GH_OAUTH_REDIRECT_URI }}" \
            -e KEY_VAULT_URI="${{ secrets.KEY_VAULT_URI }}" \
            -e KEY_VAULT_CLIENT_ID="$KV_CLIENT_ID" \
            -e KEY_VAULT_CLIENT_SECRET="$KV_CLIENT_SECRET" \
            -e KEY_VAULT_TENANT_ID="$KV_TENANT_ID" \
            team-activity-monitor:test \
            sh -c "alembic upgrade head && pytest"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/team-activity-monitor:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Point Web App at the new image
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --container-image-name "$IMAGE" \
            --container-registry-url "https://${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Set app configuration (env vars)
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --settings \
              APP_ENV=production \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
              AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
              AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
              AZURE_REDIRECT_URI="${{ secrets.AZURE_REDIRECT_URI_PROD }}" \
              JIRA_OAUTH_CLIENT_ID="${{ secrets.JIRA_OAUTH_CLIENT_ID }}" \
              JIRA_OAUTH_CLIENT_SECRET="${{ secrets.JIRA_OAUTH_CLIENT_SECRET }}" \
              JIRA_OAUTH_REDIRECT_URI="${{ secrets.JIRA_OAUTH_REDIRECT_URI_PROD }}" \
              GITHUB_OAUTH_CLIENT_ID="${{ secrets.GH_OAUTH_CLIENT_ID_PROD }}" \
              GITHUB_OAUTH_CLIENT_SECRET="${{ secrets.GH_OAUTH_CLIENT_SECRET_PROD }}" \
              GITHUB_OAUTH_REDIRECT_URI="${{ secrets.GH_OAUTH_REDIRECT_URI_PROD }}" \
              KEY_VAULT_URI="${{ secrets.KEY_VAULT_URI }}" \
              WEBSITES_PORT=8000
          # Prod deliberately does NOT set KEY_VAULT_CLIENT_ID/_SECRET/_TENANT_ID - the
          # deployed App Service authenticates to Key Vault via its own system-assigned
          # Managed Identity (DefaultAzureCredential's fallback, already granted Key
          # Vault Secrets Officer during provisioning), the same as local dev's az-login
          # identity. Those three vars are a CI-only need (see the test job above).

      - name: Restart Web App
        run: |
          az webapp restart --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" --name "${{ secrets.AZURE_WEBAPP_NAME }}"
          # A restart triggered by config changes has intermittently left the
          # site unresponsive despite reporting state=Running (see
          # blueprints/deployment.md's execution notes) — a second restart has
          # reliably recovered it both times this was hit locally.
          sleep 5
          az webapp restart --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" --name "${{ secrets.AZURE_WEBAPP_NAME }}"
